hostname lab-dist-01

interface Vlan10
 description LAB-SVI-USERS
 ip address 198.19.110.1 255.255.255.0
 no shutdown

interface Port-channel1
 description LAB-TRUNK
 switchport mode trunk
 switchport trunk allowed vlan 10-12,20
 no shutdown

access-list 101 permit tcp 198.19.110.0 0.0.0.255 host 198.19.120.10 eq 443
access-list 101 deny ip any any

ip route 192.0.2.0 255.255.255.0 198.18.0.2
