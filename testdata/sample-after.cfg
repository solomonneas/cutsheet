! Lab-safe generic network configuration sample with intentional changes
hostname lab-edge-01

interface GigabitEthernet0/1
 description LAB-USER-PORT
 switchport mode access
 switchport access vlan 20
 shutdown

interface GigabitEthernet0/2
 description LAB-UPLINK
 switchport mode trunk
 switchport trunk allowed vlan 10,30
 no shutdown

vlan 10
 name LAB-USERS

ip route 0.0.0.0 0.0.0.0 198.18.0.254

ip access-list extended MGMT-IN
 permit tcp any any eq 22
 permit ip any any

object network WEB-SERVER
 host 198.19.30.10
 nat (inside,outside) static 198.18.100.20

crypto map LAB-VPN 10 ipsec-isakmp
 set peer 198.19.255.3
 set transform-set LAB-SET

aaa authentication login default group radius local
radius server LAB-RADIUS address ipv4 198.19.110.50
username lab-admin privilege 15
ip ssh version 2
ip http server

snmp-server host 198.19.110.20 version 2c LAB-COMMUNITY
ntp server 198.19.110.40
ip name-server 198.19.110.53
