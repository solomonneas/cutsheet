set deviceconfig system hostname PA-EDGE-01
set deviceconfig system service disable-telnet yes
set mgt-config users admin permissions role-based superuser yes
set network interface ethernet ethernet1/1 layer3 ip 203.0.113.2/30
set zone untrust network layer3 ethernet1/1
set zone trust network layer3 ethernet1/2
set address NET-INTERNAL ip-netmask 198.18.0.0/8
set service svc-https protocol tcp port 443
set rulebase security rules ALLOW-WEB from untrust
set rulebase security rules ALLOW-WEB to trust
set rulebase security rules ALLOW-WEB source 198.18.0.0/8
set rulebase security rules ALLOW-WEB destination 198.19.1.10
set rulebase security rules ALLOW-WEB application web-browsing
set rulebase security rules ALLOW-WEB service application-default
set rulebase security rules ALLOW-WEB action allow
set rulebase nat rules SNAT-OUT source-translation dynamic-ip-and-port interface-address interface ethernet1/1
set network virtual-router default routing-table ip static-route DEFAULT destination 0.0.0.0/0
set network virtual-router default routing-table ip static-route DEFAULT nexthop ip-address 203.0.113.1
set network virtual-router default routing-table ip static-route MGMT destination 198.19.9.0/16
set network virtual-router default routing-table ip static-route MGMT nexthop ip-address 198.18.0.254
set deviceconfig system snmp-setting access-setting version v2c
