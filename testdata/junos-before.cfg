set system host-name lab-junos-01
set system services ssh
set system authentication-order password
set system syslog host 198.19.110.30 any any
set system ntp server 198.19.110.40
set interfaces ge-0/0/1 unit 0 family ethernet-switching vlan members LAB-USERS
set vlans LAB-USERS vlan-id 10
set routing-options static route 0.0.0.0/0 next-hop 198.18.0.1
set firewall family inet filter MGMT-IN term SSH from source-address 198.19.110.0/24
set firewall family inet filter MGMT-IN term SSH from destination-port 22
set firewall family inet filter MGMT-IN term SSH then accept
set security nat source rule-set LAB from zone trust
set security nat source rule-set LAB rule WEB then source-nat interface
set security ike gateway LAB-VPN address 198.19.255.2
