config system interface
    edit "port1"
        set ip 198.18.0.1 255.255.255.0
        set allowaccess ping ssh https
    next
end

config firewall address
    edit "LAB-USERS"
        set subnet 198.19.110.0 255.255.0.0
    next
end

config firewall policy
    edit 100
        set name "LAB-WEB"
        set srcintf "port1"
        set dstintf "port2"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
end

config firewall ippool
    edit "LAB-NAT"
        set startip 198.18.100.20
        set endip 198.18.100.20
    next
end

config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 198.18.0.254
    next
end

config vpn ipsec phase1-interface
    edit "LAB-VPN"
        set remote-gw 198.19.255.3
    next
end

config system admin
    edit "lab-admin"
        set accprofile "super_admin"
        set two-factor email
    next
end

config log syslogd setting
    edit "syslog"
        set status disable
        set server "198.19.110.30"
    next
end
