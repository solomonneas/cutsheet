config system interface
    edit "port1"
        set ip 198.18.0.1 255.255.255.0
        set allowaccess ping ssh
    next
end

config firewall address
    edit "LAB-USERS"
        set subnet 198.19.110.0 255.255.255.0
    next
end

config firewall policy
    edit 100
        set name "LAB-WEB"
        set srcintf "port1"
        set dstintf "port2"
        set srcaddr "LAB-USERS"
        set dstaddr "WEB-SERVER"
        set action accept
        set schedule "always"
        set service "HTTPS"
        set nat enable
    next
end

config firewall ippool
    edit "LAB-NAT"
        set startip 198.18.100.10
        set endip 198.18.100.10
    next
end

config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 198.18.0.1
    next
end

config vpn ipsec phase1-interface
    edit "LAB-VPN"
        set remote-gw 198.19.255.2
    next
end

config system admin
    edit "lab-admin"
        set accprofile "super_admin"
    next
end

config log syslogd setting
    edit "syslog"
        set status enable
        set server "198.19.110.30"
    next
end
