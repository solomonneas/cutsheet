! Lab-safe generic network configuration sample
hostname lab-edge-01

interface GigabitEthernet0/1
 description LAB-USER-PORT
 switchport mode access
 switchport access vlan 10
 no shutdown

interface GigabitEthernet0/2
 description LAB-UPLINK
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30
 no shutdown

vlan 10
 name LAB-USERS

vlan 20
 name LAB-VOICE

ip route 0.0.0.0 0.0.0.0 198.18.0.1
ip route 198.19.20.0 255.255.0.0 198.18.0.2

ip access-list extended MGMT-IN
 permit tcp 198.19.110.0 0.0.0.255 any eq 22
 deny ip any any

object network WEB-SERVER
 host 198.19.30.10
 nat (inside,outside) static 198.18.100.10

crypto map LAB-VPN 10 ipsec-isakmp
 set peer 198.19.255.2
 set transform-set LAB-SET

aaa authentication login default local
username lab-admin privilege 15
ip ssh version 2

snmp-server host 198.19.110.20 version 2c LAB-COMMUNITY
logging host 198.19.110.30
ntp server 198.19.110.40
ip name-server 198.19.110.53
