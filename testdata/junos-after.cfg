set system host-name lab-junos-01
set system services ssh
set system services web-management http
set system authentication-order radius
set system radius-server 198.19.110.50
set system ntp server 198.19.110.40
set interfaces ge-0/0/1 unit 0 family ethernet-switching vlan members LAB-SERVERS
set vlans LAB-SERVERS vlan-id 20
set routing-options static route 0.0.0.0/0 next-hop 198.18.0.254
set firewall family inet filter MGMT-IN term SSH from source-address 0.0.0.0/0
set firewall family inet filter MGMT-IN term SSH from destination-port 22
set firewall family inet filter MGMT-IN term SSH then accept
set security nat source rule-set LAB from zone trust
set security nat source rule-set LAB rule WEB then source-nat pool LAB-WEB
set security ike gateway LAB-VPN address 198.19.255.3
